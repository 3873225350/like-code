name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            bun-target: bun-linux-x64
            suffix: linux-x64
          - target: linux-arm64
            os: ubuntu-24.04-arm
            bun-target: bun-linux-arm64
            suffix: linux-arm64
          - target: macos-x64
            os: macos-latest
            bun-target: bun-darwin-x64
            suffix: macos-x64
          - target: macos-arm64
            os: macos-latest
            bun-target: bun-darwin-arm64
            suffix: macos-arm64
          - target: windows-x64
            os: windows-latest
            bun-target: bun-windows-x64
            suffix: windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./proxy
        run: bun install

      - name: Compile binary
        working-directory: ./proxy
        run: bun build --compile --target ${{ matrix.bun-target }} --outfile ../release/cc-route-proxy-${{ matrix.suffix }} src/index.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-route-proxy-${{ matrix.suffix }}
          path: release/cc-route-proxy-${{ matrix.suffix }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: cc-route-proxy-*
          merge-multiple: true

      - name: Display structure
        run: ls -lh release/

      - name: Compute checksums
        working-directory: release
        run: |
          sha256sum cc-route-proxy-* > sha256sums.txt
          cat sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release/cc-route-proxy-*
            release/sha256sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
