<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - TUI 终端风格</title>
    <style>
        /* TUI 终端风格样式 - 黑底绿字/白字，等宽字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', 'Consolas', 'Monaco', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 终端风格标题 - 带装饰线 */
        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            letter-spacing: 6px;
            position: relative;
            padding: 10px 30px;
        }

        h1::before, h1::after {
            content: '◆';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff00;
            font-size: 1rem;
        }

        h1::before {
            left: 0;
        }

        h1::after {
            right: 0;
        }

        /* 副标题装饰 */
        .subtitle {
            text-align: center;
            color: #00aa00;
            font-size: 0.8rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        /* 游戏容器 - 终端窗口风格，带 ASCII 边框效果 */
        .game-container {
            border: 3px solid #00ff00;
            padding: 0;
            background-color: #000000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3),
                        inset 0 0 60px rgba(0, 255, 0, 0.05);
            position: relative;
        }

        /* 终端窗口左上角装饰 */
        .game-container::before {
            content: '[ SNAKE GAME ]';
            position: absolute;
            top: -12px;
            left: 10px;
            background-color: #0a0a0a;
            padding: 0 8px;
            color: #00ff00;
            font-size: 0.75rem;
        }

        /* 游戏信息栏 - 分隔样式 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 15px 10px 15px;
            padding: 10px 15px;
            border: 1px solid #00aa00;
            background-color: #0a0a0a;
            position: relative;
        }

        /* 信息栏装饰角标 */
        .game-info::before,
        .game-info::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid #00ff00;
        }

        .game-info::before {
            top: -1px;
            left: -1px;
            border-right: none;
            border-bottom: none;
        }

        .game-info::after {
            bottom: -1px;
            right: -1px;
            border-left: none;
            border-top: none;
        }

        .score-box, .high-score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.7rem;
            color: #00aa00;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 1.4rem;
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff;
        }

        .high-score .score-value {
            color: #ffff00;
            text-shadow: 0 0 8px #ffff00;
        }

        /* 游戏状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #00aa00;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #006600;
            transition: all 0.3s;
        }

        .status-dot.running {
            background-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 1s infinite;
        }

        .status-dot.paused {
            background-color: #ffff00;
            box-shadow: 0 0 10px #ffff00;
        }

        .status-dot.gameover {
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 游戏画布 */
        canvas {
            display: block;
            border: 1px solid #00aa00;
            background-color: #000000;
            margin: 0 15px;
        }

        /* 按钮容器 */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px;
        }

        /* TUI 风格按钮 - 增强版 */
        button {
            background-color: #000000;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 12px 30px;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.2), transparent);
            transition: left 0.4s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background-color: #00ff00;
            color: #000000;
            box-shadow: 0 0 20px #00ff00, 0 0 40px rgba(0, 255, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            color: #006600;
            border-color: #006600;
            cursor: not-allowed;
        }

        button:disabled::before {
            display: none;
        }

        button:disabled:hover {
            background-color: #000000;
            color: #006600;
            box-shadow: none;
        }

        /* 难度选择区域 */
        .difficulty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 0 15px 10px 15px;
            padding: 10px;
            border: 1px solid #003300;
            color: #00aa00;
            font-size: 0.8rem;
        }

        .difficulty-control label {
            letter-spacing: 2px;
        }

        .difficulty-buttons {
            display: flex;
            gap: 8px;
        }

        .difficulty-btn {
            background-color: #000000;
            color: #00aa00;
            border: 1px solid #00aa00;
            padding: 5px 12px;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 1px;
        }

        .difficulty-btn:hover {
            background-color: #00aa00;
            color: #000000;
        }

        .difficulty-btn.active {
            background-color: #00ff00;
            color: #000000;
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        /* 暂停遮罩 */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 50;
        }

        .pause-overlay h2 {
            color: #ffff00;
            font-size: 2rem;
            text-shadow: 0 0 15px #ffff00;
            letter-spacing: 8px;
            margin-bottom: 15px;
        }

        .pause-overlay p {
            color: #00aa00;
            font-size: 0.9rem;
        }

        .speed-control label {
            letter-spacing: 2px;
        }

        .speed-control input[type="range"] {
            -webkit-appearance: none;
            width: 120px;
            height: 4px;
            background: linear-gradient(to right, #003300, #00ff00);
            outline: none;
            border-radius: 2px;
        }

        .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #00ff00;
            cursor: pointer;
            border: none;
            border-radius: 0;
            box-shadow: 0 0 8px #00ff00;
        }

        .speed-value {
            min-width: 20px;
            text-align: center;
            color: #00ff00;
        }

        /* 游戏结束提示 */
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #0a0a0a;
            border: 3px solid #ff3333;
            padding: 40px 50px;
            text-align: center;
            display: none;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5),
                        inset 0 0 30px rgba(255, 0, 0, 0.1);
            z-index: 100;
        }

        .game-over h2 {
            color: #ff3333;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ff3333;
            letter-spacing: 6px;
            animation: flicker 0.5s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .game-over p {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .game-over .final-score-value {
            color: #ffff00;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #ffff00;
        }

        .game-over button {
            margin-top: 20px;
            border-color: #ff3333;
            color: #ff3333;
        }

        .game-over button:hover {
            background-color: #ff3333;
            color: #000000;
            box-shadow: 0 0 20px #ff3333;
        }

        /* 操作说明 */
        .instructions {
            margin-top: 20px;
            padding: 15px 25px;
            border: 1px dashed #004400;
            color: #00aa00;
            font-size: 0.8rem;
            text-align: center;
            max-width: 420px;
            background-color: #050505;
        }

        .instructions kbd {
            background-color: #001100;
            border: 1px solid #00aa00;
            padding: 3px 8px;
            color: #00ff00;
            margin: 0 2px;
        }

        /* 响应式布局 */
        @media (max-width: 500px) {
            h1 {
                font-size: 1.5rem;
                letter-spacing: 3px;
            }

            h1::before, h1::after {
                display: none;
            }

            .game-container {
                max-width: 100%;
            }

            canvas {
                width: 100%;
                height: auto;
            }

            .game-info {
                flex-wrap: wrap;
                gap: 10px;
            }

            .button-container {
                flex-wrap: wrap;
            }

            button {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }

        /* 食物闪烁动画 */
        @keyframes foodPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }

        /* 得分增加动画 */
        @keyframes scoreUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #00ff00; }
            100% { transform: scale(1); }
        }

        .score-value.animate {
            animation: scoreUp 0.3s ease;
        }
    </style>
</head>
<body>
    <h1>贪吃蛇 SNAKE</h1>
    <p class="subtitle">- TERMLINAL EDITION -</p>

    <div class="game-container">
        <div class="game-info">
            <div class="score-box">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="score">0</span>
            </div>

            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">就绪</span>
            </div>

            <div class="score-box high-score">
                <span class="score-label">BEST</span>
                <span class="score-value" id="highScore">0</span>
            </div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <!-- 暂停遮罩 -->
        <div class="pause-overlay" id="pauseOverlay">
            <h2>暂停</h2>
            <p>按 P 键继续</p>
        </div>

        <!-- 按钮区域 -->
        <div class="button-container">
            <button id="startBtn">开始</button>
            <button id="restartBtn" disabled>重置</button>
        </div>

        <!-- 速度控制 -->
        <div class="speed-control">
            <label>速度:</label>
            <input type="range" id="speedSlider" min="1" max="10" value="5">
            <span class="speed-value" id="speedValue">5</span>
        </div>

        <!-- 难度选择 -->
        <div class="difficulty-control">
            <label>难度:</label>
            <div class="difficulty-buttons">
                <button class="difficulty-btn" data-difficulty="easy">简单</button>
                <button class="difficulty-btn active" data-difficulty="normal">中等</button>
                <button class="difficulty-btn" data-difficulty="hard">困难</button>
            </div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>最终得分: <span class="final-score-value" id="finalScore">0</span></p>
        <button id="restartBtn2">再来一局</button>
    </div>

    <!-- 操作说明 -->
    <div class="instructions">
        使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制蛇的移动<br>
        <kbd>P</kbd> 暂停/继续 | 吃到食物得分，撞墙或撞自己游戏结束
    </div>

    <script>
        // ========== 游戏配置 ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 格子大小
        const GRID_SIZE = 20;
        const GRID_COUNT = canvas.width / GRID_SIZE;

        // 游戏状态
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 }; // 初始向右移动
        let nextDirection = { x: 1, y: 0 }; // 缓存下一个方向，防止快速按键导致掉头
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop = null;
        let speed = 150; // 初始速度 (ms)
        let currentDifficulty = 'normal'; // 当前难度

        // 难度配置
        const difficultySettings = {
            easy: { speed: 200, speedLabel: 3 },
            normal: { speed: 150, speedLabel: 5 },
            hard: { speed: 80, speedLabel: 8 }
        };

        // DOM 元素
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const restartBtn2 = document.getElementById('restartBtn2');
        const gameOverEl = document.getElementById('gameOver');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        // 初始化最高分显示
        highScoreEl.textContent = highScore;

        // ========== 游戏核心逻辑 ==========

        /**
         * 初始化游戏状态
         * 创建一个3节的蛇，位置在画布中央
         */
        function initGame() {
            // 蛇初始位置 (在画布中央)
            const startX = Math.floor(GRID_COUNT / 2);
            const startY = Math.floor(GRID_COUNT / 2);

            // 创建初始蛇身 (3节)
            snake = [
                { x: startX, y: startY },       // 蛇头
                { x: startX - 1, y: startY },   // 身体
                { x: startX - 2, y: startY }    // 尾巴
            ];

            // 重置方向
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };

            // 重置分数
            score = 0;
            scoreEl.textContent = score;

            // 生成第一个食物
            spawnFood();

            // 隐藏游戏结束弹窗
            gameOverEl.style.display = 'none';
        }

        /**
         * 生成随机食物
         * 确保食物不会生成在蛇身上
         */
        function spawnFood() {
            let validPosition = false;

            while (!validPosition) {
                // 随机位置
                food.x = Math.floor(Math.random() * GRID_COUNT);
                food.y = Math.floor(Math.random() * GRID_COUNT);

                // 检查是否与蛇身重叠
                validPosition = !snake.some(segment =>
                    segment.x === food.x && segment.y === food.y
                );
            }
        }

        /**
         * 游戏主循环
         * 处理移动、碰撞检测、绘制
         */
        function gameStep() {
            // 更新方向 (防止快速按键导致掉头自杀)
            direction = { ...nextDirection };

            // 计算新的蛇头位置
            const newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // === 碰撞检测 ===

            // 1. 撞墙检测
            if (newHead.x < 0 || newHead.x >= GRID_COUNT ||
                newHead.y < 0 || newHead.y >= GRID_COUNT) {
                gameOver();
                return;
            }

            // 2. 撞自己检测
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                gameOver();
                return;
            }

            // 将新蛇头加入
            snake.unshift(newHead);

            // === 吃食物检测 ===
            if (newHead.x === food.x && newHead.y === food.y) {
                // 吃到食物，得分+10
                score += 10;
                scoreEl.textContent = score;

                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }

                // 生成新食物
                spawnFood();

                // 吃完食物后蛇尾不移动 (蛇变长)
            } else {
                // 没吃到食物，移除蛇尾
                snake.pop();
            }

            // 绘制游戏画面
            draw();
        }

        /**
         * 绘制游戏画面
         * TUI 风格: 绿色蛇身，白色食物，简洁方块
         */
        function draw() {
            // 清空画布 (黑色背景)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线 (可选，增加终端感)
            ctx.strokeStyle = '#0a0a0a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // 绘制食物 (白色方块，带发光效果)
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.fillRect(
                food.x * GRID_SIZE + 2,
                food.y * GRID_SIZE + 2,
                GRID_SIZE - 4,
                GRID_SIZE - 4
            );
            ctx.shadowBlur = 0;

            // 绘制蛇身
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头 - 亮绿色
                    ctx.fillStyle = '#00ff00';
                    ctx.shadowColor = '#00ff00';
                    ctx.shadowBlur = 15;
                } else {
                    // 蛇身 - 稍暗的绿色
                    const green = Math.max(0, 255 - index * 8);
                    ctx.fillStyle = `rgb(0, ${green}, 0)`;
                    ctx.shadowBlur = 0;
                }

                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            });
            ctx.shadowBlur = 0;
        }

        /**
         * 游戏结束处理
         * 更新状态指示器为结束状态
         */
        function gameOver() {
            gameRunning = false;
            gamePaused = false;
            clearInterval(gameLoop);
            gameLoop = null;

            // 显示游戏结束弹窗
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
            pauseOverlay.style.display = 'none';

            // 更新按钮状态
            startBtn.disabled = false;
            restartBtn.disabled = true;
            restartBtn2.disabled = false;

            // 更新状态指示器
            updateStatus('gameover');
        }

        /**
         * 开始游戏
         * 更新状态指示器为运行状态
         */
        function startGame() {
            if (gameRunning) return;

            // 初始化游戏状态
            initGame();

            // 开始游戏循环
            gameRunning = true;
            gamePaused = false;
            startBtn.disabled = true;
            restartBtn.disabled = false;
            restartBtn2.disabled = true;

            // 更新状态指示器为运行中
            updateStatus('running');

            // 绘制初始画面
            draw();

            // 启动游戏循环 (使用 setInterval 实现定时移动)
            gameLoop = setInterval(gameStep, speed);
        }

        /**
         * 重新开始游戏
         */
        function restartGame() {
            // 停止当前游戏
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            gameRunning = false;
            gamePaused = false;
            pauseOverlay.style.display = 'none';

            // 开始新游戏
            startGame();
        }

        /**
         * 暂停/继续游戏
         */
        function togglePause() {
            if (!gameRunning) return;

            gamePaused = !gamePaused;

            if (gamePaused) {
                // 暂停游戏
                clearInterval(gameLoop);
                gameLoop = null;
                pauseOverlay.style.display = 'flex';
                statusDot.className = 'status-dot paused';
                statusText.textContent = '暂停';
            } else {
                // 继续游戏
                pauseOverlay.style.display = 'none';
                statusDot.className = 'status-dot running';
                statusText.textContent = '运行中';
                gameLoop = setInterval(gameStep, speed);
            }
        }

        /**
         * 设置游戏难度
         */
        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            const settings = difficultySettings[difficulty];

            // 更新速度
            speed = settings.speed;
            speedSlider.value = settings.speedLabel;
            speedValue.textContent = settings.speedLabel;

            // 更新按钮状态
            difficultyBtns.forEach(btn => {
                if (btn.dataset.difficulty === difficulty) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // 如果游戏正在进行，更新速度
            if (gameRunning && !gamePaused) {
                clearInterval(gameLoop);
                gameLoop = setInterval(gameStep, speed);
            }
        }

        /**
         * 更新状态指示器
         */
        function updateStatus(status) {
            statusDot.className = 'status-dot ' + status;
            switch(status) {
                case 'running':
                    statusText.textContent = '运行中';
                    break;
                case 'paused':
                    statusText.textContent = '暂停';
                    break;
                case 'gameover':
                    statusText.textContent = '结束';
                    break;
                default:
                    statusText.textContent = '就绪';
            }
        }

        // ========== 事件监听 ==========

        // 键盘控制 - 方向键和暂停
        document.addEventListener('keydown', (e) => {
            // 阻止方向键滚动页面
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }

            // 暂停功能 - P键
            if (e.key === 'p' || e.key === 'P') {
                togglePause();
                return;
            }

            // 游戏未运行或暂停时忽略方向键
            if (!gameRunning || gamePaused) return;

            // 方向控制逻辑
            // 不能直接反向移动 (例如向右时不能直接向左)
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);
        restartBtn2.addEventListener('click', restartGame);

        // 速度滑块控制
        speedSlider.addEventListener('input', (e) => {
            const value = parseInt(e.target.value);
            speedValue.textContent = value;
            // 速度值 1-10，映射到延迟 300ms-50ms
            // 值越大，速度越快 (延迟越小)
            speed = 300 - (value - 1) * 25;

            // 如果游戏正在进行，更新速度
            if (gameRunning && !gamePaused) {
                clearInterval(gameLoop);
                gameLoop = setInterval(gameStep, speed);
            }
        });

        // 难度按钮点击事件
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setDifficulty(btn.dataset.difficulty);
            });
        });

        // ========== 初始化 ==========
        // 初始绘制 (静态)
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 绘制提示文字
        ctx.fillStyle = '#00aa00';
        ctx.font = '20px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('按 "开始" 开始', canvas.width / 2, canvas.height / 2);

        // 初始化状态指示器
        statusDot.className = 'status-dot';
        statusText.textContent = '就绪';
    </script>
</body>
</html>
